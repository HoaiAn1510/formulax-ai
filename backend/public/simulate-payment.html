<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>MoMo — Giả lập xác nhận thanh toán (Dev only)</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; color: #1E293B; }
  h1 { font-size: 1.2rem; }
  p.warn { background: #FFFBEB; border: 1px solid #F59E0B; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; }
  label { display: block; font-weight: 600; font-size: 0.85rem; margin: 14px 0 4px; }
  input { width: 100%; padding: 8px 10px; border: 1px solid #CBD5E1; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
  button { margin-top: 16px; padding: 10px 16px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
  #btnCheck { background: #E2E8F0; color: #1E293B; }
  #btnConfirm { background: #A20067; color: white; margin-left: 8px; }
  pre { background: #0f172a; color: #d1fae5; padding: 12px; border-radius: 8px; font-size: 0.8rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
  <h1>Giả lập MoMo xác nhận thanh toán</h1>
  <p class="warn">Chỉ dùng khi test — thay cho bước quét QR bằng app MoMo Test. Gọi trực tiếp vào backend đang mở trang này (cùng origin), không cần CORS.</p>

  <label>Order ID (lấy từ bước "Nâng cấp Pro" trên web, hoặc phần "raw"/log tạo đơn)</label>
  <input id="orderId" placeholder="FMX..." />

  <label>Dev Secret (giá trị DEV_SIMULATE_SECRET trong backend/.env)</label>
  <input id="secret" placeholder="dán secret vào đây" type="password" />

  <button id="btnCheck">Kiểm tra trạng thái đơn</button>
  <button id="btnConfirm">Xác nhận thanh toán (giả lập)</button>

  <pre id="out">Kết quả sẽ hiện ở đây...</pre>

<script>
  const out = document.getElementById("out");
  const base = ""; // same-origin — trang này được backend tự phục vụ

  document.getElementById("btnCheck").onclick = async () => {
    const orderId = document.getElementById("orderId").value.trim();
    if (!orderId) return (out.textContent = "Thiếu Order ID.");
    out.textContent = "Đang kiểm tra...";
    try {
      const res = await fetch(`${base}/api/payment/momo/payment/${encodeURIComponent(orderId)}`);
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      out.textContent = "Lỗi: " + e.message;
    }
  };

  document.getElementById("btnConfirm").onclick = async () => {
    const orderId = document.getElementById("orderId").value.trim();
    const secret = document.getElementById("secret").value.trim();
    if (!orderId || !secret) return (out.textContent = "Cần nhập đủ Order ID và Dev Secret.");
    out.textContent = "Đang gửi xác nhận giả lập...";
    try {
      const res = await fetch(`${base}/api/payment/momo/simulate-success`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ orderId, secret }),
      });
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      out.textContent = "Lỗi: " + e.message;
    }
  };
</script>
</body>
</html>
